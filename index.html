<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js"></script>
</head>
<body>
    <div class="container rounded-4 w-50">
        <center><h1>Cinesophia Tickets 🎥</h1></center>
        <hr>
        <form>
            <b><p>STUDENT DETAILS</p></b>

            <label for="">Full Name</label>
            <input type="text" class="form-control"><br>    
            
            <b><p>TICKET SELECTION</p></b>
            <label for="">Quantity (₱250.00 each)</label>
            <input type="number" class="form-control" id="qty">
        </form><br>

        <div class="paymentdeta rounded-4">
            <b><p>PAYMENT DETAILS</p></b>

            <label for="">Subtotal:</label>
            <input type="text" class="form-control" id="subtotal" readonly><br>

            <label for="">Admin Fee:</label>
            <input type="text" class="form-control" placeholder="₱50.00" readonly><hr>

            <b><label for="">Total:</label></b>
            <input type="text" class="form-control" id="tota" readonly>
        </div>

        <center>
            <button type="button" class="btn btn-dark mt-3" onclick="tyDollaSign()">Complete Registration</button>
            <button type="button" class="btn btn-dark mt-3" onclick="window.location.reload()">Refresh</button>
        </center>
    </div>
</body>
</html>
